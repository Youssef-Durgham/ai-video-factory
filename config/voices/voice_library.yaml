    language: "ar"
    accent: "MSA"
    description: "صوت غامض ومشوّق، مثالي للألغاز والجرائم والمحتوى الدرامي"
    recording_file_path: "config/voices/male_mysterious_01.wav"
    embedding_path: "config/voices/embeddings/v_male_myst_01.pt"
