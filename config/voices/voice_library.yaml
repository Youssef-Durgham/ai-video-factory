# ─── Voice Selection Rules ─────────────────
selection_rules:
  # Channel lock: if channel config specifies a voice, always use it
  channel_override: true
  # If no channel lock, select by content match
  fallback_strategy: "best_match"  # "best_match" | "highest_quality" | "random"
  # Minimum quality score to be eligible
  min_quality_score: 7.0
