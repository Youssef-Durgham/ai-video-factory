# Pre-defined Arabic voice profiles for documentary narration.
# Each voice has a unique embedding generated from reference recordings.

voice_library:
  - id: "v_male_auth_01"
    name: "خالد - السلطوي"
    gender: "male"
    age_range: [35, 50]
    emotion_range: ["authoritative", "dramatic", "calm", "serious"]
    quality_score: 9.2
    language: "ar"
    accent: "MSA"
    description: "صوت ذكوري عميق وسلطوي، مثالي للوثائقيات الجادة والتحليلات السياسية"
    recording_file_path: "config/voices/male_authoritative_01.wav"
    embedding_path: "config/voices/embeddings/v_male_auth_01.pt"
    best_for: ["documentary", "geopolitics", "history", "military"]
    speaking_rate_wpm: 140
    pitch_range: "low"

  - id: "v_male_enrg_01"
    name: "أحمد - الحيوي"
    gender: "male"
    age_range: [25, 35]
    emotion_range: ["energetic", "exciting", "hopeful", "enthusiastic"]
