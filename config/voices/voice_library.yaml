    language: "ar"
    accent: "MSA"
    description: "صوت نسائي واضح ودافئ، مناسب للمحتوى التعليمي والثقافي"
    recording_file_path: "config/voices/female_educational_01.wav"
    embedding_path: "config/voices/embeddings/v_female_edu_01.pt"
    best_for: ["culture", "education", "health", "social"]
    speaking_rate_wpm: 145
    pitch_range: "mid-high"

  - id: "v_male_narr_01"
    name: "يوسف - الراوي"
    gender: "male"
    age_range: [30, 45]
    emotion_range: ["storytelling", "warm", "reflective", "engaging"]
    quality_score: 9.5
    language: "ar"
    accent: "MSA"
    description: "صوت سردي دافئ وجذاب، الأفضل للقصص والحكايات والسرد الوثائقي"
    recording_file_path: "config/voices/male_narrator_01.wav"
